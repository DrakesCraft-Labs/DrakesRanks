# DrakesRanks main config.
# Defines rank metadata, permissions, and player->rank assignment.

# Rank assigned when player has no explicit mapping in `players`.
# [DANGER] This value must match an existing key under `ranks`.
default-rank: Member

ranks:
  Member:
    # Prefix shown in chat/tab (MiniMessage).
    prefix: "<gray>[Member]</gray>"

    # Optional suffix.
    suffix: ""

    # Informative color token for integrations.
    color: "<gray>"

    # Weight priority. Higher = stronger rank.
    weight: 0

    # Permission nodes injected through PermissionAttachment.
    permissions:
      - "drakescore.use"

  Admin:
    prefix: "<gradient:red:gold>[Admin]</gradient>"
    suffix: ""
    color: "<red>"
    weight: 100
    permissions:
      # [DANGER] Wildcard gives full permission graph.
      - "*"

# UUID -> rank-name map (case-insensitive rank matching).
players: {}
